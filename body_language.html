<script>
function goBack() {
  window.location.href = "https://scratchsay.github.io";
}

const data = [
  // (same data as before — keep unchanged)
  // paste your full dataset here exactly as is
];

let showNT = true;
let showND = true;

/* Rarity ranking (lower = more common) */
const rarityOrder = {
  "Frequent": 1,
  "Common": 2,
  "Uncommon": 3,
  "Rare": 4,
  "Extremely Rare": 5
};

function renderTable() {
  const tbody = document.getElementById("tableBody");
  const search = document.getElementById("search").value.toLowerCase();
  tbody.innerHTML = "";

  /* FILTER + SORT */
  const filtered = data
    .filter(item =>
      ((item.type === "NT" && showNT) || (item.type === "ND" && showND)) &&
      item.name.toLowerCase().includes(search)
    )
    .sort((a, b) => rarityOrder[a.rarity] - rarityOrder[b.rarity]);

  filtered.forEach(item => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.name}</td>
      <td>${item.meaning}</td>
      <td class="rarity">
        ${item.rarity}
        <div class="tooltip">${item.percent}</div>
      </td>
    `;

    tbody.appendChild(row);
  });
}

function toggleFilter(type) {
  if (type === "NT") {
    showNT = !showNT;
    document.getElementById("ntBtn").classList.toggle("active");
  } else {
    showND = !showND;
    document.getElementById("ndBtn").classList.toggle("active");
  }
  renderTable();
}

renderTable();
</script>
