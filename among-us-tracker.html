<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Among Us Sus Tracker</title>
<style>
body{font-family:Arial;background:#111;color:white;padding:20px}
.card{background:#222;padding:12px;border-radius:10px;margin:10px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
button,select,input{padding:8px;border-radius:8px;border:none;margin:4px}
button{background:#ffcc66;cursor:pointer}
.danger{background:#ff7777}
table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{border:1px solid #555;padding:8px}
th{background:#333}
.dead{opacity:.45}
.clear{outline:2px solid #66ff99}
.hidden{display:none}
</style>
</head>
<body>

<h1>Among Us Sus Tracker</h1>

<div id="settings">
  <div class="card">
    <h2>Game Settings</h2>

    <label>Map:</label>
    <select id="mapSelect">
      <option value="airship">Airship</option>
      <option value="polus">Polus</option>
      <option value="skeld">Skeld</option>
    </select>

    <h3>Colors in game</h3>
    <div id="colorChoices" class="grid"></div>

    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<div id="game" class="hidden">

  <div class="card">
    <h2>Round <span id="roundNum">1</span></h2>

    <label>Who died?</label>
    <select id="deadPlayer"></select>

    <label>Body location:</label>
    <select id="bodyRoom"></select>

    <h3>Where is everyone?</h3>
    <div id="locations" class="grid"></div>

    <h3>Sabotage</h3>
    <select id="sabotage">
      <option value="">None</option>
      <option>Lights</option>
      <option>Reactor</option>
      <option>O2</option>
      <option>Comms</option>
      <option>Doors</option>
    </select>

    <h3>Who fixed sabotage?</h3>
    <div id="fixers" class="grid"></div>

    <h3>Confirmed roles / clears</h3>
    <div id="clears" class="grid"></div>

    <button onclick="saveRound()">Save Round</button>
    <button class="danger" onclick="resetGame()">Full Reset</button>
  </div>

  <h2>Sus Ranking</h2>
  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Sus Points</th>
        <th>Reason</th>
      </tr>
    </thead>
    <tbody id="ranking"></tbody>
  </table>

  <h2>Round Log</h2>
  <div id="log"></div>
</div>

<script>
const allColors=[
"Red","Blue","Green","Pink","Orange","Yellow",
"Black","White","Purple","Brown","Cyan","Lime",
"Maroon","Rose","Banana","Gray","Tan","Coral"
];

let gameStarted=false;
let chosenMap="";
let round=1;
let players=[];
let rounds=[];

const maps={
airship:{
walk:{
"Vault":["Brig"],
"Brig":["Vault","Gap Room","Engine Room"],
"Cockpit":["Communications"],
"Communications":["Cockpit","Engine Room","Armory"],
"Engine Room":["Communications","Brig","Main Hall","Armory"],
"Armory":["Communications","Engine Room","Kitchen"],
"Kitchen":["Armory","Viewing Deck","Security"],
"Viewing Deck":["Kitchen"],
"Security":["Kitchen","Electrical"],
"Main Hall":["Gap Room","Engine Room","Electrical","Showers","Wideecam"],
"Gap Room":["Meeting Room","Brig","Records","Main Hall"],
"Meeting Room":["Gap Room"],
"Records":["Gap Room","Showers","Lounge"],
"Lounge":["Records","Cargo Bay","PA"],
"Cargo Bay":["Lounge","Medical"],
"Medical":["Cargo Bay","Electrical"],
"Electrical":["Security","Main Hall","Showers","Medical"],
"Showers":["Records","Main Hall","Electrical"],
"PA":["Lounge"],
"Wideecam":["Main Hall"]
},
vents:{}
},

polus:{
walk:{
"Dropship":["North Outside"],
"North Outside":["Dropship","Security","Electrical","Storage","Laboratory"],
"Security":["North Outside","Electrical"],
"Electrical":["Security","North Outside","O2","Communications"],
"O2":["Electrical","Boiler Room","Outside"],
"Outside":["O2","Admin","Storage","Communications"],
"Boiler Room":["O2","Weapons"],
"Weapons":["Boiler Room","Office","Communications"],
"Communications":["Electrical","Weapons","Office","Storage","Outside"],
"Office":["Weapons","Communications","Storage","Admin"],
"Storage":["Office","Laboratory","Communications","Outside"],
"Admin":["Office","Decontamination"],
"Decontamination":["Admin","Specimen Room"],
"Specimen Room":["Decontamination","Laboratory"],
"Laboratory":["Specimen Room","North Outside","Medical","North Decontamination","Storage"],
"North Decontamination":["Laboratory","Medical"],
"Medical":["Laboratory","North Decontamination"]
},
vents:{
"Security":["Electrical","O2"],
"Electrical":["Security","O2"],
"O2":["Security","Electrical"],
"Office":["Admin","Communications","Laboratory Entrance","East Lava"],
"Admin":["Office","Communications"],
"Communications":["Office","Admin"],
"Storage":["Laboratory","North Outside"],
"Laboratory":["Storage","North Outside","Laboratory Entrance"],
"North Outside":["Storage","Laboratory"],
"Laboratory Entrance":["Office","East Lava","Laboratory"],
"East Lava":["Office","Laboratory Entrance"]
}
},

skeld:{
walk:{
"Cafeteria":["Upper Engine","MedBay","Weapons","Admin","Storage"],
"Upper Engine":["Cafeteria","Reactor","Security","Lower Engine"],
"Reactor":["Upper Engine","Lower Engine","Security"],
"Security":["Upper Engine","Reactor","Electrical","Lower Engine"],
"Lower Engine":["Upper Engine","Reactor","Electrical","Storage"],
"Electrical":["Lower Engine","Security","Storage"],
"Storage":["Cafeteria","Lower Engine","Electrical","Admin","Communications","Shields"],
"Admin":["Cafeteria","Storage"],
"Weapons":["Cafeteria","O2","Navigation"],
"O2":["Weapons","Navigation","Admin"],
"Navigation":["Weapons","O2","Shields"],
"Shields":["Navigation","Communications","Storage"],
"Communications":["Storage","Shields"],
"MedBay":["Cafeteria","Upper Hallway"],
"Upper Hallway":["MedBay","Cafeteria"],
"Cafeteria Hall":["Cafeteria","Admin"]
},
vents:{
"Reactor":["Upper Engine","Lower Engine"],
"Upper Engine":["Reactor"],
"Lower Engine":["Reactor"],
"Electrical":["Security","MedBay"],
"Security":["Electrical","MedBay"],
"MedBay":["Electrical","Security"],
"Admin":["Cafeteria Hall","Navigation","Shields"],
"Cafeteria Hall":["Admin","Navigation","Shields"],
"Navigation":["Admin","Cafeteria Hall","Shields"],
"Shields":["Admin","Cafeteria Hall","Navigation"]
}
}
};

function makeUndirected(graph){
  for(const a in graph){
    graph[a].forEach(b=>{
      if(!graph[b])graph[b]=[];
      if(!graph[b].includes(a))graph[b].push(a);
    });
  }
}
Object.values(maps).forEach(m=>{
  makeUndirected(m.walk);
  makeUndirected(m.vents);
});

function rooms(){
  return [...new Set([
    ...Object.keys(maps[chosenMap].walk),
    ...Object.keys(maps[chosenMap].vents)
  ])].sort();
}

function shortest(graph,start,end){
  if(!start||!end)return Infinity;
  if(start===end)return 0;

  let q=[[start,0]];
  let seen=new Set([start]);

  while(q.length){
    const [cur,d]=q.shift();
    for(const next of graph[cur]||[]){
      if(next===end)return d+1;
      if(!seen.has(next)){
        seen.add(next);
        q.push([next,d+1]);
      }
    }
  }
  return Infinity;
}

function directVent(start,end){
  const vents=maps[chosenMap].vents;
  return vents[start] && vents[start].includes(end);
}

function isClear(p){
  return p.engineer||p.tracker||p.medscan;
}

function renderColorChoices(){
  const div=document.getElementById("colorChoices");
  div.innerHTML="";
  allColors.forEach(c=>{
    div.innerHTML+=`
      <label>
        <input type="checkbox" value="${c}">
        ${c}
      </label>
    `;
  });
}

function startGame(){
  chosenMap=document.getElementById("mapSelect").value;

  const selected=[...document.querySelectorAll("#colorChoices input:checked")]
    .map(x=>x.value);

  if(selected.length<4){
    alert("Pick at least 4 colors.");
    return;
  }

  players=selected.map(c=>({
    color:c,
    dead:false,
    engineer:false,
    tracker:false,
    medscan:false,
    location:"",
    susPoints:0,
    roundsSus:[],
    fixedSabotages:0
  }));

  gameStarted=true;
  round=1;
  rounds=[];

  document.getElementById("settings").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  renderGame();
  saveLocal();
}

function renderGame(){
  document.getElementById("roundNum").textContent=round;

  const body=document.getElementById("bodyRoom");
  body.innerHTML="";
  rooms().forEach(r=>body.innerHTML+=`<option>${r}</option>`);

  const dead=document.getElementById("deadPlayer");
  dead.innerHTML=`<option value="">Nobody</option>`;
  players.filter(p=>!p.dead).forEach(p=>{
    dead.innerHTML+=`<option>${p.color}</option>`;
  });

  const locDiv=document.getElementById("locations");
  locDiv.innerHTML="";
  players.forEach(p=>{
    if(p.dead)return;
    locDiv.innerHTML+=`
      <div class="card">
        <b>${p.color}</b>
        <select onchange="setLocation('${p.color}',this.value)">
          <option value="">Unknown</option>
          ${rooms().map(r=>`<option ${p.location===r?"selected":""}>${r}</option>`).join("")}
        </select>
      </div>
    `;
  });

  const fixDiv=document.getElementById("fixers");
  fixDiv.innerHTML="";
  players.filter(p=>!p.dead).forEach(p=>{
    fixDiv.innerHTML+=`
      <label><input type="checkbox" class="fixer" value="${p.color}"> ${p.color}</label>
    `;
  });

  const clearDiv=document.getElementById("clears");
  clearDiv.innerHTML="";
  players.filter(p=>!p.dead).forEach(p=>{
    clearDiv.innerHTML+=`
      <div class="card ${isClear(p)?"clear":""}">
        <b>${p.color}</b>
        <label><input type="checkbox" ${p.engineer?"checked":""} onchange="setClear('${p.color}','engineer',this.checked)"> Engineer</label>
        <label><input type="checkbox" ${p.tracker?"checked":""} onchange="setClear('${p.color}','tracker',this.checked)"> Tracker</label>
        <label><input type="checkbox" ${p.medscan?"checked":""} onchange="setClear('${p.color}','medscan',this.checked)"> Medbay / clear</label>
      </div>
    `;
  });

  renderRanking();
  renderLog();
}

function setLocation(color,loc){
  players.find(p=>p.color===color).location=loc;
  saveLocal();
}

function setClear(color,type,value){
  players.find(p=>p.color===color)[type]=value;
  renderGame();
  saveLocal();
}

function saveRound(){
  const body=document.getElementById("bodyRoom").value;
  const deadColor=document.getElementById("deadPlayer").value;
  const sabotage=document.getElementById("sabotage").value;
  const fixers=[...document.querySelectorAll(".fixer:checked")].map(x=>x.value);

  let susThisRound=[];

  players.forEach(p=>{
    if(p.dead||isClear(p)||!p.location)return;

    const walk=shortest(maps[chosenMap].walk,p.location,body);
    const vent=directVent(p.location,body);

    if((walk>=1&&walk<=2)||vent){
      p.susPoints++;
      p.roundsSus.push(round);
      susThisRound.push({
        color:p.color,
        location:p.location,
        walk:walk===Infinity?"?":walk,
        directVent:vent
      });
    }
  });

  fixers.forEach(c=>{
    const p=players.find(x=>x.color===c);
    if(p)p.fixedSabotages++;
  });

  if(deadColor){
    const dead=players.find(p=>p.color===deadColor);
    if(dead)dead.dead=true;
  }

  rounds.push({
    round,
    body,
    dead:deadColor||"Nobody",
    sabotage:sabotage||"None",
    fixers,
    susThisRound
  });

  round++;
  document.getElementById("sabotage").value="";
  renderGame();
  saveLocal();
}

function renderRanking(){
  const tbody=document.getElementById("ranking");
  tbody.innerHTML="";

  const ranked=players
    .filter(p=>!p.dead&&!isClear(p))
    .sort((a,b)=>b.susPoints-a.susPoints);

  ranked.forEach((p,i)=>{
    tbody.innerHTML+=`
      <tr>
        <td>${i+1}</td>
        <td>${p.color}</td>
        <td>${p.susPoints}</td>
        <td>
          Sus rounds: ${p.roundsSus.length?p.roundsSus.join(", "):"none"}.
          Fixed sabotages: ${p.fixedSabotages}.
        </td>
      </tr>
    `;
  });
}

function renderLog(){
  const log=document.getElementById("log");
  log.innerHTML="";

  rounds.forEach(r=>{
    log.innerHTML+=`
      <div class="card">
        <b>Round ${r.round}</b><br>
        Dead: ${r.dead}<br>
        Body: ${r.body}<br>
        Sabotage: ${r.sabotage}<br>
        Fixed by: ${r.fixers.length?r.fixers.join(", "):"Nobody"}<br>
        Got +1 sus:
        ${r.susThisRound.length
          ? r.susThisRound.map(s =>
            `${s.color} at ${s.location} — walk ${s.walk}${s.directVent?", direct vent":""}`
          ).join("<br>")
          : "Nobody"}
      </div>
    `;
  });
}

function resetGame(){
  localStorage.removeItem("amongSusTrackerV2");
  gameStarted=false;
  chosenMap="";
  round=1;
  players=[];
  rounds=[];

  document.getElementById("game").classList.add("hidden");
  document.getElementById("settings").classList.remove("hidden");

  renderColorChoices();
}

function saveLocal(){
  localStorage.setItem("amongSusTrackerV2",JSON.stringify({
    gameStarted,chosenMap,round,players,rounds
  }));
}

function loadLocal(){
  const saved=localStorage.getItem("amongSusTrackerV2");
  if(!saved){
    renderColorChoices();
    return;
  }

  const data=JSON.parse(saved);
  gameStarted=data.gameStarted;
  chosenMap=data.chosenMap;
  round=data.round;
  players=data.players;
  rounds=data.rounds;

  if(gameStarted){
    document.getElementById("settings").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    renderGame();
  }else{
    renderColorChoices();
  }
}

loadLocal();
</script>
</body>
</html>
