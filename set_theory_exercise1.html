<!DOCTYPE html>
<html>
<head>

<title>Math Logic Drill</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

h1{
    color:#00ff99;
}

#question{
    font-size:28px;
    margin:45px;
    line-height:1.7;
}

button{
    width:180px;
    height:80px;
    margin:20px;
    font-size:30px;
    border-radius:15px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.option{
    background:white;
    color:black;
}

.correct{
    background:#00aa55;
    color:white;
}

.wrong{
    background:#cc3333;
    color:white;
}

#score{
    font-size:25px;
}

</style>

</head>


<body>

<h1>Sets + Logic Brain Drill</h1>

<div id="score">
Score: 0
</div>

<div id="question"></div>

<div id="answers"></div>



<script>


let score=0;



function randomSet(){

    let s=[];

    let size=Math.floor(Math.random()*4)+1;


    while(s.length<size){

        let n=Math.floor(Math.random()*9)+1;

        if(!s.includes(n)){
            s.push(n);
        }

    }

    return s.sort();

}



function equal(a,b){

    return a.length===b.length &&
    a.every(x=>b.includes(x));

}



function union(a,b){

    return [...new Set([...a,...b])].sort();

}



function intersection(a,b){

    return a.filter(x=>b.includes(x)).sort();

}



function subset(a,b){

    return a.every(x=>b.includes(x));

}



function properSubset(a,b){

    return subset(a,b)&&!equal(a,b);

}





function logicQuestion(){


    let examples=[


    {
        p:"a number is divisible by 4",
        q:"the number is even",
        equivalent:"If a number is not even, then it is not divisible by 4."
    },


    {
        p:"a shape is a square",
        q:"it has four sides",
        equivalent:"If a shape does not have four sides, then it is not a square."
    },


    {
        p:"x is greater than 0",
        q:"x³ is not 0",
        equivalent:"If x³ is 0, then x is not greater than 0."
    },


    {
        p:"a number is divisible by 6",
        q:"a number is divisible by 3",
        equivalent:"If a number is not divisible by 3, then it is not divisible by 6."
    }

];


let item=
examples[Math.floor(Math.random()*examples.length)];



let type=Math.floor(Math.random()*4);



let first=
`If ${item.p}, then ${item.q}.`;

let second="";

let answer=false;



// same

if(type===0){

second=first;

answer=true;

}



// contrapositive

if(type===1){

second=item.equivalent;

answer=true;

}



// converse

if(type===2){

second=
`If ${item.q}, then ${item.p}.`;

answer=false;

}



// inverse

if(type===3){

second=
`If ${item.p.replace("not ","")}
 is not true, then ${item.q} is not true.`;

answer=false;

}



return{

question:
`
Statement 1:<br>
${first}
<br><br>

Statement 2:<br>
${second}
`,

answer

};


}







function generateQuestion(){



let type=Math.floor(Math.random()*13);



let A=randomSet();
let B=randomSet();


let q="";
let ans=false;



// logic

if(type===12){

    return logicQuestion();

}




if(type===0){

let x=A[Math.floor(Math.random()*A.length)];

q=`${x} ∈ {${A}}`;

ans=true;

}





if(type===1){

let x=10;

q=`${x} ∉ {${A}}`;

ans=true;

}





if(type===2){

let C=[...new Set([...A,...B])];

q=`{${A}} ∪ {${B}} = {${C}}`;

ans=true;

}





if(type===3){

let C=intersection(A,B);

q=`{${A}} ∩ {${B}} = {${C}}`;

ans=true;

}





if(type===4){

q=`{${A}} ∪ ∅ = {${A}}`;

ans=true;

}





if(type===5){

q=`{${A}} ∩ ∅ = ∅`;

ans=true;

}





if(type===6){

let C=[...new Set([...A,...B])];

q=`{${A}} ⊂ {${C}}`;

ans=subset(A,C);

}





if(type===7){

let C=[...new Set([...A,...B,9])];

q=`{${A}} ⊊ {${C}}`;

ans=properSubset(A,C);

}





if(type===8){

q=`∅ ⊂ {${A}}`;

ans=true;

}





if(type===9){

q=`{${A}} = {${[...A].reverse()}}`;

ans=true;

}





if(type===10){

q=`{${A}} ≠ {${B}}`;

ans=!equal(A,B);

}





if(type===11){

q=`{${A}} ⊃ {${B}}`;

ans=subset(B,A);

}



return{

question:q,
answer:ans

};


}







let current;



function load(){


current=generateQuestion();


document.getElementById("question").innerHTML=
current.question;



let area=document.getElementById("answers");

area.innerHTML="";



// always true left

["True","False"].forEach(choice=>{


let btn=document.createElement("button");

btn.innerHTML=choice;

btn.className="option";



btn.onclick=function(){


let picked=(choice==="True");


if(picked===current.answer){

score++;

btn.className="correct";

}

else{

btn.className="wrong";

}



document.getElementById("score").innerHTML=
"Score: "+score;



setTimeout(load,800);


};



area.appendChild(btn);



});


}



load();


</script>

</body>
</html>
