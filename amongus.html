<!DOCTYPE html>
<html>
<head>
  <title>Among Us Round Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 { color: #ffcc00; }

    button {
      padding: 10px;
      margin: 10px 5px 10px 0;
      border: none;
      border-radius: 6px;
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    .round {
      background: #222;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #181818;
    }

    th, td {
      border: 1px solid #555;
      padding: 6px;
      text-align: left;
    }

    th {
      background: #333;
      color: #ffcc00;
    }

    input, select {
      width: 100%;
      padding: 6px;
      border-radius: 4px;
      border: none;
      box-sizing: border-box;
    }

    .sus {
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Among Us Round Tracker</h1>

<button onclick="addRound()">Add New Round</button>
<button onclick="saveData()">Save</button>
<button onclick="clearAll()">Clear All</button>

<div id="rounds"></div>

<script>
const colors = [
  "Red", "Blue", "Green", "Pink", "Orange", "Yellow",
  "Black", "White", "Purple", "Brown", "Cyan", "Lime"
];

let rounds = JSON.parse(localStorage.getItem("amongUsRounds")) || [];

function createEmptyRound() {
  return {
    bodyLocation: "",
    players: colors.map(color => ({
      color,
      directionLeft: "Unknown",
      claim: "",
      backedAway: "No",
      weirdMovement: "No",
      notes: ""
    }))
  };
}

function addRound() {
  rounds.push(createEmptyRound());
  renderRounds();
  saveData();
}

function calculateSuspicion(player) {
  let score = 0;

  if (player.directionLeft !== "Unknown") score++;
  if (player.backedAway === "Yes") score += 2;
  if (player.backedAway === "Maybe") score++;
  if (player.weirdMovement === "Yes") score += 2;
  if (player.weirdMovement === "Maybe") score++;
  if (player.notes.trim() !== "") score++;

  if (score >= 5) return "Very Sus";
  if (score >= 3) return "Sus";
  if (score >= 1) return "Slightly Sus";
  return "Not Sus";
}

function updateRound(roundIndex, field, value) {
  rounds[roundIndex][field] = value;
  saveData();
}

function updatePlayer(roundIndex, playerIndex, field, value) {
  rounds[roundIndex].players[playerIndex][field] = value;
  saveData();
  renderRounds();
}

function deleteRound(roundIndex) {
  rounds.splice(roundIndex, 1);
  renderRounds();
  saveData();
}

function renderRounds() {
  const container = document.getElementById("rounds");
  container.innerHTML = "";

  rounds.forEach((round, roundIndex) => {
    const div = document.createElement("div");
    div.className = "round";

    div.innerHTML = `
      <h2>Round ${roundIndex + 1}</h2>

      <label>Where body died / was found:</label>
      <input 
        value="${round.bodyLocation}" 
        oninput="updateRound(${roundIndex}, 'bodyLocation', this.value)"
        placeholder="Example: Electrical, Storage, MedBay"
      >

      <table>
        <thead>
          <tr>
            <th>Color</th>
            <th>Direction Left</th>
            <th>Claimed Location</th>
            <th>Backing Away</th>
            <th>Moving Weirdly</th>
            <th>Notes</th>
            <th>Suspicion</th>
          </tr>
        </thead>
        <tbody>
          ${round.players.map((player, playerIndex) => `
            <tr>
              <td><b>${player.color}</b></td>

              <td>
                <select onchange="updatePlayer(${roundIndex}, ${playerIndex}, 'directionLeft', this.value)">
                  ${["Unknown", "Left", "Right", "Up", "Down"].map(dir => `
                    <option ${player.directionLeft === dir ? "selected" : ""}>${dir}</option>
                  `).join("")}
                </select>
              </td>

              <td>
                <input 
                  value="${player.claim}" 
                  oninput="updatePlayer(${roundIndex}, ${playerIndex}, 'claim', this.value)"
                  placeholder="Where they say they were"
                >
              </td>

              <td>
                <select onchange="updatePlayer(${roundIndex}, ${playerIndex}, 'backedAway', this.value)">
                  ${["No", "Maybe", "Yes"].map(opt => `
                    <option ${player.backedAway === opt ? "selected" : ""}>${opt}</option>
                  `).join("")}
                </select>
              </td>

              <td>
                <select onchange="updatePlayer(${roundIndex}, ${playerIndex}, 'weirdMovement', this.value)">
                  ${["No", "Maybe", "Yes"].map(opt => `
                    <option ${player.weirdMovement === opt ? "selected" : ""}>${opt}</option>
                  `).join("")}
                </select>
              </td>

              <td>
                <input 
                  value="${player.notes}" 
                  oninput="updatePlayer(${roundIndex}, ${playerIndex}, 'notes', this.value)"
                  placeholder="Extra info"
                >
              </td>

              <td class="sus">${calculateSuspicion(player)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>

      <button onclick="deleteRound(${roundIndex})">Delete Round</button>
    `;

    container.appendChild(div);
  });
}

function saveData() {
  localStorage.setItem("amongUsRounds", JSON.stringify(rounds));
}

function clearAll() {
  if (confirm("Clear all rounds?")) {
    rounds = [];
    saveData();
    renderRounds();
  }
}

if (rounds.length === 0) {
  addRound();
} else {
  renderRounds();
}
</script>

</body>
</html>
