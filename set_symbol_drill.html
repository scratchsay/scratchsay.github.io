<!DOCTYPE html>
<html>
<head>
<title>Math Logic & Sets Drill</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

h1{
    color:#00ff99;
}

#question{
    font-size:30px;
    margin:50px;
    line-height:1.6;
}

button{
    width:180px;
    height:80px;
    margin:20px;
    font-size:30px;
    border-radius:15px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.correct{
    background:#00aa55;
    color:white;
}

.wrong{
    background:#cc3333;
    color:white;
}

.option{
    background:white;
    color:black;
}

#score{
    font-size:25px;
}
</style>

</head>


<body>

<h1>Sets + Logic Brain Drill</h1>

<div id="score">Score: 0</div>

<div id="question"></div>

<div id="answers"></div>


<script>

let score=0;



function randomSet(){

    let s=[];

    let size=Math.floor(Math.random()*4)+1;

    while(s.length<size){

        let n=Math.floor(Math.random()*9)+1;

        if(!s.includes(n)){
            s.push(n);
        }

    }

    return s.sort();

}



function equal(a,b){
    return a.length===b.length &&
    a.every(x=>b.includes(x));
}



function union(a,b){
    return [...new Set([...a,...b])].sort();
}



function intersection(a,b){
    return a.filter(x=>b.includes(x)).sort();
}



function subset(a,b){
    return a.every(x=>b.includes(x));
}



function properSubset(a,b){
    return subset(a,b)&&!equal(a,b);
}




function generateQuestion(){


let type=Math.floor(Math.random()*12);


let A=randomSet();
let B=randomSet();


let q="";
let ans=false;



// UNION

if(type===0){

let result=union(A,B);

q=`{${A}} ∪ {${B}} = {${result}}`;

ans=true;

}




// UNION TRICK

if(type===1){

let result=union(A,B);

result.push(9);

q=`{${A}} ∪ {${B}} = {${result}}`;

ans=false;

}




// INTERSECTION

if(type===2){

let result=intersection(A,B);

q=`{${A}} ∩ {${B}} = {${result}}`;

ans=true;

}




// EMPTY SET UNION

if(type===3){

q=`{${A}} ∪ ∅ = {${A}}`;

ans=true;

}




// EMPTY SET INTERSECTION

if(type===4){

q=`{${A}} ∩ ∅ = ∅`;

ans=true;

}




// SUBSET

if(type===5){

q=`{${A}} ⊂ {${[...new Set([...A,...B])]}}`;

ans=true;

}




// PROPER SUBSET

if(type===6){

let bigger=[...new Set([...A,...B,9])];

q=`{${A}} ⊊ {${bigger}}`;

ans=true;

}




// CONDITIONAL

if(type===7){

let examples=[

[
"If 12 is divisible by 4, then 12 is even.",
true
],

[
"If 6 is even, then 6 is divisible by 4.",
false
],

[
"If 9 is divisible by 3, then 9 is odd.",
true
],

[
"If 5 is even, then 5 is divisible by 10.",
true
]

];


let x=examples[Math.floor(Math.random()*examples.length)];

q=x[0];

ans=x[1];

}




// CONTRAPOSITIVE

if(type===8){

q=`
Original:<br>
If a number is divisible by 4, then it is even.<br><br>

Contrapositive:<br>
If a number is not even, then it is not divisible by 4.
`;

ans=true;

}




// CONVERSE

if(type===9){

q=`
Original:<br>
If a number is divisible by 4, then it is even.<br><br>

Converse:<br>
If a number is even, then it is divisible by 4.
`;

ans=false;

}




// EMPTY SET SUBSET

if(type===10){

q=`∅ ⊂ {${A}}`;

ans=true;

}




// EQUALITY

if(type===11){

let C=[...A];

q=`{${A}} = {${C.reverse()}}`;

ans=true;

}



return {
question:q,
answer:ans
};


}





let current;



function load(){


current=generateQuestion();


document.getElementById("question").innerHTML=
current.question;



let area=document.getElementById("answers");

area.innerHTML="";



// TRUE LEFT, FALSE RIGHT

["True","False"].forEach(choice=>{


let btn=document.createElement("button");

btn.innerHTML=choice;

btn.className="option";


btn.onclick=function(){


let chosen=(choice==="True");


if(chosen===current.answer){

score++;

btn.className="correct";

}

else{

btn.className="wrong";

}



document.getElementById("score").innerHTML=
"Score: "+score;


setTimeout(load,800);


};



area.appendChild(btn);


});


}



load();


</script>

</body>
</html>
