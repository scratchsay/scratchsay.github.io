<!DOCTYPE html>
<html>
<head>
<title>Set Symbol True/False Drill</title>

<style>
body {
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

h1 {
    color:#00ff99;
}

#question {
    font-size:32px;
    margin:50px;
}

button {
    width:180px;
    height:80px;
    margin:15px;
    font-size:30px;
    border-radius:15px;
    cursor:pointer;
}

button:hover {
    transform:scale(1.05);
}

.correct {
    background:#00aa55;
    color:white;
}

.wrong {
    background:#cc3333;
    color:white;
}

.option {
    background:white;
    color:black;
}

#score {
    font-size:24px;
}
</style>

</head>

<body>

<h1>Set Symbol True/False Drill</h1>

<div id="score">Score: 0</div>

<div id="question"></div>

<div id="answers"></div>


<script>

let score = 0;



function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}



function randomSet(){

    let set=[];

    let size=Math.floor(Math.random()*4)+1;

    while(set.length<size){

        let n=Math.floor(Math.random()*9)+1;

        if(!set.includes(n)){
            set.push(n);
        }
    }

    return set.sort();

}



function equal(a,b){

    return a.length===b.length &&
    a.every(x=>b.includes(x));

}



function subset(a,b){

    return a.every(x=>b.includes(x));

}



function properSubset(a,b){

    return subset(a,b) && !equal(a,b);

}



function contains(a,b){

    return subset(b,a);

}





function generateQuestion(){

    let type=Math.floor(Math.random()*7);

    let A=randomSet();
    let B=randomSet();

    let statement;
    let answer;



    // Membership ∈ / ∉
    if(type===0){

        let x=Math.floor(Math.random()*9)+1;

        let shouldBeInside=Math.random()>0.5;


        if(shouldBeInside){

            if(!A.includes(x)){
                A.push(x);
            }

            answer=true;

        }else{

            while(A.includes(x)){
                x=Math.floor(Math.random()*9)+1;
            }

            answer=false;
        }


        statement=`${x} ∈ {${A.join(",")}}`;

    }




    // Equality
    if(type===1){

        if(Math.random()>0.5){
            B=[...A];
        }


        statement=
        `{${A.join(",")}} = {${B.join(",")}}`;

        answer=equal(A,B);

    }





    // Not equal
    if(type===2){

        if(equal(A,B)){
            B.push(9);
        }


        statement=
        `{${A.join(",")}} ≠ {${B.join(",")}}`;

        answer=!equal(A,B);

    }





    // Subset
    if(type===3){

        if(Math.random()>0.5){

            B=[...new Set([
                ...A,
                Math.floor(Math.random()*9)+1
            ])];

        }


        statement=
        `{${A.join(",")}} ⊂ {${B.join(",")}}`;

        // equality allowed
        answer=subset(A,B);

    }





    // Proper subset
    if(type===4){

        B=[...A];

        let extra=Math.floor(Math.random()*9)+1;

        while(B.includes(extra)){
            extra=Math.floor(Math.random()*9)+1;
        }

        B.push(extra);
        B.sort();


        statement=
        `{${A.join(",")}} ⊊ {${B.join(",")}}`;

        answer=properSubset(A,B);

    }





    // Contains
    if(type===5){

        A=[...new Set([
            ...B,
            Math.floor(Math.random()*9)+1
        ])];


        statement=
        `{${A.join(",")}} ⊃ {${B.join(",")}}`;

        answer=contains(A,B);

    }





    // Random false traps
    if(type===6){

        B=[...A];

        B.push(10);


        statement=
        `{${B.join(",")}} ⊊ {${A.join(",")}}`;

        answer=false;

    }



    return {
        statement,
        answer
    };

}





let current;



function loadQuestion(){

    current=generateQuestion();


    document.getElementById("question").innerHTML=
    current.statement;


    let choices=["True","False"];

    shuffle(choices);


    let area=document.getElementById("answers");

    area.innerHTML="";



    choices.forEach(choice=>{


        let btn=document.createElement("button");

        btn.innerHTML=choice;

        btn.className="option";



        btn.onclick=function(){


            let chosen=(choice==="True");


            if(chosen===current.answer){

                score++;

                btn.className="correct";

            }else{

                btn.className="wrong";

            }


            document.getElementById("score").innerHTML=
            "Score: "+score;


            setTimeout(loadQuestion,700);


        };


        area.appendChild(btn);

    });

}



loadQuestion();

</script>

</body>
</html>
