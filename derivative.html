<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Derivative Practice Generator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
    text-align:center;
}

.problem{
    font-size:28px;
    margin:25px 0;
    text-align:center;
}

input,select,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
}

button{
    cursor:pointer;
}

#feedback{
    font-weight:bold;
    margin-top:15px;
}

#solution{
    margin-top:15px;
    color:#444;
}
</style>
</head>

<body>

<div class="container">

<h1>Derivative Practice</h1>

<label>Difficulty</label>
<select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
</select>

<div id="problem" class="problem"></div>

<input id="answer" placeholder="Enter derivative">

<button onclick="checkAnswer()">Check Answer</button>
<button onclick="showSolution()">Show Solution</button>
<button onclick="newProblem()">New Problem</button>

<div id="feedback"></div>
<div id="solution"></div>

</div>

<script>

let current;

function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function clean(str){
    return str.toLowerCase()
              .replace(/\s/g,"")
              .replace(/\*/g,"");
}

function term(a,n){

    if(n===1){
        return a===1 ? "x" : a+"x";
    }

    return (a===1 ? "" : a) + "x^" + n;
}

function dTerm(a,n){

    if(n===1){
        return String(a);
    }

    const coef=a*n;
    const power=n-1;

    if(power===1){
        return coef+"x";
    }

    return coef+"x^"+power;
}

function generateEasy(){

    const type=rand(1,5);

    if(type===1){

        const a=rand(1,9);
        const n=rand(2,8);

        return{
            problem:`y = ${term(a,n)}`,
            answer:dTerm(a,n),
            solution:`Power rule: ${term(a,n)} → ${dTerm(a,n)}`
        };
    }

    if(type===2){
        return{
            problem:"y = sin(x)",
            answer:"cos(x)",
            solution:"d/dx[sin(x)] = cos(x)"
        };
    }

    if(type===3){
        return{
            problem:"y = cos(x)",
            answer:"-sin(x)",
            solution:"d/dx[cos(x)] = -sin(x)"
        };
    }

    if(type===4){
        return{
            problem:"y = ln(x)",
            answer:"1/x",
            solution:"d/dx[ln(x)] = 1/x"
        };
    }

    return{
        problem:"y = e^x",
        answer:"e^x",
        solution:"d/dx[e^x] = e^x"
    };
}

function generateMedium(){

    const terms=rand(2,5);

    let problem="";
    let derivative="";

    for(let i=0;i<terms;i++){

        const a=rand(1,9);
        const n=rand(1,6);

        const sign=(i===0)
            ? ""
            : (Math.random()<0.5 ? "+" : "-");

        problem += sign + term(a,n);

        let d=dTerm(a,n);

        derivative += sign + d;
    }

    return{
        problem:"y = "+problem,
        answer:derivative,
        solution:"Differentiate each term separately.\nAnswer: "+derivative
    };
}

function generateHard(){

    const type=rand(1,3);

    if(type===1){

        const a=rand(2,6);
        const n=rand(2,5);

        return{
            problem:`y = sin(${a}x^${n})`,
            answer:`${a*n}x^${n-1}cos(${a}x^${n})`,
            solution:`Chain rule:\nDerivative = cos(${a}x^${n}) × (${a*n}x^${n-1})`
        };
    }

    if(type===2){

        const a=rand(2,6);
        const n=rand(2,5);

        return{
            problem:`y = cos(${a}x^${n})`,
            answer:`-${a*n}x^${n-1}sin(${a}x^${n})`,
            solution:`Chain rule:\nDerivative = -sin(${a}x^${n}) × (${a*n}x^${n-1})`
        };
    }

    const a=rand(1,5);
    const n=rand(2,4);

    return{
        problem:`y = ${term(a,n)}sin(x)`,
        answer:`${a*n}x^${n-1}sin(x)+${term(a,n)}cos(x)`,
        solution:`Product rule:\n(fg)' = f'g + fg'`
    };
}

function newProblem(){

    const difficulty=
        document.getElementById("difficulty").value;

    if(difficulty==="easy"){
        current=generateEasy();
    }

    if(difficulty==="medium"){
        current=generateMedium();
    }

    if(difficulty==="hard"){
        current=generateHard();
    }

    document.getElementById("problem").textContent=
        current.problem;

    document.getElementById("answer").value="";
    document.getElementById("feedback").textContent="";
    document.getElementById("solution").textContent="";
}

function checkAnswer(){

    const user=
        clean(document.getElementById("answer").value);

    const correct=
        clean(current.answer);

    if(user===correct){

        document.getElementById("feedback").textContent=
            "✅ Correct!";

        document.getElementById("feedback").style.color=
            "green";

        setTimeout(newProblem,1000);

    }else{

        document.getElementById("feedback").textContent=
            "❌ Incorrect. Try again or click Show Solution.";

        document.getElementById("feedback").style.color=
            "red";
    }
}

function showSolution(){

    document.getElementById("solution").innerText=
        current.solution + "\n\nAnswer: " + current.answer;
}

newProblem();

</script>

</body>
</html>
