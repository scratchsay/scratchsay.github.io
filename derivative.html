<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Derivative Practice Generator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:30px;
}
.container{
    max-width:850px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
h1{text-align:center;}
.problem{
    font-size:30px;
    margin:25px 0;
    text-align:center;
}
input,select,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
}
button{cursor:pointer;}
#feedback{
    font-weight:bold;
    margin-top:15px;
    font-size:18px;
}
#solution{
    margin-top:15px;
    color:#444;
    white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">
<h1>Derivative Practice Generator</h1>

<label>Difficulty</label>
<select id="difficulty" onchange="newProblem()">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
    <option value="expert">Expert</option>
</select>

<p>Find the derivative.</p>

<div id="problem" class="problem"></div>

<input id="answer" placeholder="Example: 12x^3">

<button onclick="checkAnswer()">Check Answer</button>
<button onclick="showSolution()">Show Solution</button>
<button onclick="newProblem()">New Problem</button>

<div id="feedback"></div>
<div id="solution"></div>
</div>

<script>
let current;

function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function weightedPick(items){
    let total = items.reduce((sum,item)=>sum+item.weight,0);
    let r = Math.random()*total;

    for(let item of items){
        if(r < item.weight) return item.value;
        r -= item.weight;
    }
}

function clean(str){
    return str
        .toLowerCase()
        .replace(/\s/g,"")
        .replace(/\*/g,"")
        .replace(/y'=/g,"")
        .replace(/dy\/dx=/g,"")
        .replace(/−/g,"-");
}

function term(a,n){
    if(n===0) return String(a);
    if(n===1) return a===1 ? "x" : a+"x";
    return (a===1 ? "" : a)+"x^"+n;
}

function dTerm(a,n){
    if(n===0) return "0";
    if(n===1) return String(a);

    let coef=a*n;
    let power=n-1;

    if(power===1) return coef+"x";
    return coef+"x^"+power;
}

function generateEasy(){
    let type = weightedPick([
        {value:"power", weight:40},
        {value:"sin", weight:20},
        {value:"cos", weight:20},
        {value:"exp", weight:10},
        {value:"ln", weight:10}
    ]);

    if(type==="power"){
        let a=rand(1,12);
        let n=rand(2,8);

        return{
            problem:`y = ${term(a,n)}`,
            answer:dTerm(a,n),
            rule:"Power Rule",
            solution:`Use the power rule: d/dx[x^n] = nx^(n-1)

${term(a,n)} → ${dTerm(a,n)}

Answer: y' = ${dTerm(a,n)}`
        };
    }

    if(type==="sin"){
        let n=rand(2,12);

        return{
            problem:`y = sin(${n}x)`,
            answer:`${n}cos(${n}x)`,
            rule:"Chain Rule",
            solution:`Use the chain rule.

d/dx[sin(${n}x)] = cos(${n}x) · ${n}

Answer: y' = ${n}cos(${n}x)`
        };
    }

    if(type==="cos"){
        let n=rand(2,12);

        return{
            problem:`y = cos(${n}x)`,
            answer:`-${n}sin(${n}x)`,
            rule:"Chain Rule",
            solution:`Use the chain rule.

d/dx[cos(${n}x)] = -sin(${n}x) · ${n}

Answer: y' = -${n}sin(${n}x)`
        };
    }

    if(type==="exp"){
        let n=rand(2,12);

        return{
            problem:`y = e^(${n}x)`,
            answer:`${n}e^(${n}x)`,
            rule:"Chain Rule",
            solution:`Use the chain rule.

d/dx[e^(${n}x)] = e^(${n}x) · ${n}

Answer: y' = ${n}e^(${n}x)`
        };
    }

    let n=rand(2,12);

    return{
        problem:`y = ln(${n}x)`,
        answer:"1/x",
        rule:"Chain Rule",
        solution:`Use the chain rule.

d/dx[ln(${n}x)] = 1/(${n}x) · ${n}

Answer: y' = 1/x`
    };
}

function generateMedium(){
    let type = weightedPick([
        {value:"poly", weight:40},
        {value:"trigCombo", weight:25},
        {value:"polySin", weight:15},
        {value:"polyCos", weight:10},
        {value:"polyExp", weight:10}
    ]);

    if(type==="poly"){
        let count=rand(3,5);
        let problem="";
        let derivative="";

        for(let i=0;i<count;i++){
            let a=rand(1,12);
            let n=rand(1,7);
            let sign=i===0 ? "" : pick([" + "," - "]);

            problem += sign + term(a,n);
            derivative += sign + dTerm(a,n);
        }

        derivative = derivative.replace(/\+\-/g,"-");

        return{
            problem:"y = "+problem,
            answer:derivative,
            rule:"Power Rule and Sum Rule",
            solution:`Differentiate each term separately.

Answer: y' = ${derivative}`
        };
    }

    if(type==="trigCombo"){
        let z=rand(2,12);
        let l=rand(2,12);

        return{
            problem:`y = ${z}sin(x) - ${l}cos(x)`,
            answer:`${z}cos(x)+${l}sin(x)`,
            rule:"Trig Derivatives and Sum Rule",
            solution:`d/dx[${z}sin(x)] = ${z}cos(x)
d/dx[-${l}cos(x)] = +${l}sin(x)

Answer: y' = ${z}cos(x) + ${l}sin(x)`
        };
    }

    if(type==="polySin"){
        let a=rand(2,9), n=rand(2,6), b=rand(2,12);

        return{
            problem:`y = ${term(a,n)} + ${b}sin(x)`,
            answer:`${dTerm(a,n)}+${b}cos(x)`,
            rule:"Power Rule, Trig Derivative, and Sum Rule",
            solution:`${term(a,n)} → ${dTerm(a,n)}
${b}sin(x) → ${b}cos(x)

Answer: y' = ${dTerm(a,n)} + ${b}cos(x)`
        };
    }

    if(type==="polyCos"){
        let a=rand(2,9), n=rand(2,6), b=rand(2,12);

        return{
            problem:`y = ${term(a,n)} + ${b}cos(x)`,
            answer:`${dTerm(a,n)}-${b}sin(x)`,
            rule:"Power Rule, Trig Derivative, and Sum Rule",
            solution:`${term(a,n)} → ${dTerm(a,n)}
${b}cos(x) → -${b}sin(x)

Answer: y' = ${dTerm(a,n)} - ${b}sin(x)`
        };
    }

    let a=rand(2,9), n=rand(2,6), b=rand(2,12);

    return{
        problem:`y = ${term(a,n)} + ${b}e^x`,
        answer:`${dTerm(a,n)}+${b}e^x`,
        rule:"Power Rule, Exponential Rule, and Sum Rule",
        solution:`${term(a,n)} → ${dTerm(a,n)}
${b}e^x → ${b}e^x

Answer: y' = ${dTerm(a,n)} + ${b}e^x`
    };
}

function generateHard(){
    let type = weightedPick([
        {value:"chainSinPoly", weight:30},
        {value:"chainCosPoly", weight:30},
        {value:"productPolySin", weight:25},
        {value:"sinCosProduct", weight:15}
    ]);

    if(type==="chainSinPoly"){
        let a=rand(2,8), n=rand(2,5);

        return{
            problem:`y = sin(${a}x^${n})`,
            answer:`${a*n}x^${n-1}cos(${a}x^${n})`,
            rule:"Chain Rule",
            solution:`Outer: sin(u) → cos(u)
Inner: ${a}x^${n} → ${a*n}x^${n-1}

Answer: y' = ${a*n}x^${n-1}cos(${a}x^${n})`
        };
    }

    if(type==="chainCosPoly"){
        let a=rand(2,8), n=rand(2,5);

        return{
            problem:`y = cos(${a}x^${n})`,
            answer:`-${a*n}x^${n-1}sin(${a}x^${n})`,
            rule:"Chain Rule",
            solution:`Outer: cos(u) → -sin(u)
Inner: ${a}x^${n} → ${a*n}x^${n-1}

Answer: y' = -${a*n}x^${n-1}sin(${a}x^${n})`
        };
    }

    if(type==="productPolySin"){
        let a=rand(1,6), n=rand(2,5), b=rand(2,8);

        return{
            problem:`y = ${term(a,n)}sin(${b}x)`,
            answer:`${dTerm(a,n)}sin(${b}x)+${term(a,n)}${b}cos(${b}x)`,
            rule:"Product Rule and Chain Rule",
            solution:`Product rule: (fg)' = f'g + fg'

f = ${term(a,n)}
g = sin(${b}x)

f' = ${dTerm(a,n)}
g' = ${b}cos(${b}x)

Answer:
y' = ${dTerm(a,n)}sin(${b}x) + ${term(a,n)}${b}cos(${b}x)`
        };
    }

    return{
        problem:`y = sin(x)cos(x)`,
        answer:`cos(x)^2-sin(x)^2`,
        rule:"Product Rule",
        solution:`Product rule: (fg)' = f'g + fg'

d/dx[sin(x)cos(x)]
= cos(x)cos(x) + sin(x)(-sin(x))

Answer: y' = cos(x)^2 - sin(x)^2`
    };
}

function generateExpert(){
    let type = weightedPick([
        {value:"productChain", weight:35},
        {value:"sumChainExp", weight:35},
        {value:"quotient", weight:30}
    ]);

    if(type==="productChain"){
        let a=rand(1,5), n=rand(2,4), b=rand(2,8);

        return{
            problem:`y = (${term(a,n)} + 1)cos(${b}x)`,
            answer:`${dTerm(a,n)}cos(${b}x)-${b}(${term(a,n)}+1)sin(${b}x)`,
            rule:"Product Rule and Chain Rule",
            solution:`Product rule plus chain rule.

f = ${term(a,n)} + 1
g = cos(${b}x)

f' = ${dTerm(a,n)}
g' = -${b}sin(${b}x)

Answer:
y' = ${dTerm(a,n)}cos(${b}x) - ${b}(${term(a,n)} + 1)sin(${b}x)`
        };
    }

    if(type==="sumChainExp"){
        let a=rand(2,7), n=rand(2,5), b=rand(2,8);

        return{
            problem:`y = sin(${a}x^${n}) + e^(${b}x)`,
            answer:`${a*n}x^${n-1}cos(${a}x^${n})+${b}e^(${b}x)`,
            rule:"Chain Rule and Sum Rule",
            solution:`sin(${a}x^${n}) uses chain rule.
e^(${b}x) also uses chain rule.

Answer:
y' = ${a*n}x^${n-1}cos(${a}x^${n}) + ${b}e^(${b}x)`
        };
    }

    let a=rand(1,5), n=rand(2,4), b=rand(2,8);

    return{
        problem:`y = ${term(a,n)} / sin(${b}x)`,
        answer:`(${dTerm(a,n)}sin(${b}x)-${term(a,n)}${b}cos(${b}x))/(sin(${b}x))^2`,
        rule:"Quotient Rule and Chain Rule",
        solution:`Quotient rule: (f/g)' = (f'g - fg') / g²

f = ${term(a,n)}
g = sin(${b}x)

f' = ${dTerm(a,n)}
g' = ${b}cos(${b}x)

Answer:
y' = (${dTerm(a,n)}sin(${b}x) - ${term(a,n)}${b}cos(${b}x)) / (sin(${b}x))²`
    };
}

function newProblem(){
    let difficulty=document.getElementById("difficulty").value;

    if(difficulty==="easy") current=generateEasy();
    if(difficulty==="medium") current=generateMedium();
    if(difficulty==="hard") current=generateHard();
    if(difficulty==="expert") current=generateExpert();

    document.getElementById("problem").textContent=current.problem;
    document.getElementById("answer").value="";
    document.getElementById("feedback").textContent="";
    document.getElementById("solution").textContent="";
}

function checkAnswer(){
    let user=clean(document.getElementById("answer").value);
    let correct=clean(current.answer);

    if(user===correct){
        document.getElementById("feedback").textContent="✅ Correct!";
        document.getElementById("feedback").style.color="green";
        setTimeout(newProblem,1000);
    }else{
        document.getElementById("feedback").textContent="❌ Not quite. Try again or click Show Solution.";
        document.getElementById("feedback").style.color="red";
    }
}

function showSolution(){
    document.getElementById("solution").textContent =
        "Rule used: " + current.rule + "\n\n" + current.solution;
}

newProblem();
</script>

</body>
</html>
