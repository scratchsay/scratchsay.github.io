<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Derivative Practice Generator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:850px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
    text-align:center;
}

.problem{
    font-size:30px;
    margin:25px 0;
    text-align:center;
}

input,select,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
}

button{
    cursor:pointer;
}

#feedback{
    font-weight:bold;
    margin-top:15px;
    font-size:18px;
}

#solution{
    margin-top:15px;
    color:#444;
    white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>Derivative Practice Generator</h1>

<label>Difficulty</label>
<select id="difficulty" onchange="newProblem()">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
    <option value="expert">Expert</option>
</select>

<p>Find the derivative.</p>

<div id="problem" class="problem"></div>

<input id="answer" placeholder="Example: 12x^3">

<button onclick="checkAnswer()">Check Answer</button>
<button onclick="showSolution()">Show Solution</button>
<button onclick="newProblem()">New Problem</button>

<div id="feedback"></div>
<div id="solution"></div>

</div>

<script>
let current;

function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function clean(str){
    return str
        .toLowerCase()
        .replace(/\s/g,"")
        .replace(/\*/g,"")
        .replace(/y'=/g,"")
        .replace(/dy\/dx=/g,"")
        .replace(/ã/g,"-");
}

function term(a,n){
    if(n===0) return String(a);
    if(n===1) return a===1 ? "x" : a+"x";
    return (a===1 ? "" : a)+"x^"+n;
}

function dTerm(a,n){
    if(n===0) return "0";
    if(n===1) return String(a);

    let coef=a*n;
    let power=n-1;

    if(power===1) return coef+"x";
    return coef+"x^"+power;
}

function addSign(str){
    return str.replace(/\+\-/g,"-");
}

function generateEasy(){
    let type=rand(1,6);

    if(type===1){
        let a=rand(1,9);
        let n=rand(2,8);

        return{
            problem:`y = ${term(a,n)}`,
            answer:dTerm(a,n),
            solution:`Power rule:
${term(a,n)} ã ${dTerm(a,n)}

Answer: y' = ${dTerm(a,n)}`
        };
    }

    if(type===2){
        let a=rand(2,9);

        return{
            problem:`y = sin(${a}x)`,
            answer:`${a}cos(${a}x)`,
            solution:`Chain rule:
d/dx[sin(${a}x)] = cos(${a}x) ôñ ${a}

Answer: y' = ${a}cos(${a}x)`
        };
    }

    if(type===3){
        let a=rand(2,9);

        return{
            problem:`y = cos(${a}x)`,
            answer:`-${a}sin(${a}x)`,
            solution:`Chain rule:
d/dx[cos(${a}x)] = -sin(${a}x) ôñ ${a}

Answer: y' = -${a}sin(${a}x)`
        };
    }

    if(type===4){
        let a=rand(2,9);

        return{
            problem:`y = ln(${a}x)`,
            answer:"1/x",
            solution:`Chain rule:
d/dx[ln(${a}x)] = 1/(${a}x) ôñ ${a}
This simplifies to 1/x.

Answer: y' = 1/x`
        };
    }

    if(type===5){
        let a=rand(2,9);

        return{
            problem:`y = e^(${a}x)`,
            answer:`${a}e^(${a}x)`,
            solution:`Chain rule:
d/dx[e^(${a}x)] = e^(${a}x) ôñ ${a}

Answer: y' = ${a}e^(${a}x)`
        };
    }

    let m=rand(2,12);
    let b=rand(1,20);

    return{
        problem:`y = ${m}x + ${b}`,
        answer:String(m),
        solution:`The derivative of ${m}x is ${m}.
The derivative of a constant is 0.

Answer: y' = ${m}`
    };
}

function generateMedium(){
    let type=rand(1,4);

    if(type===1){
        let count=rand(3,5);
        let problem="";
        let derivative="";

        for(let i=0;i<count;i++){
            let a=rand(1,9);
            let n=rand(1,6);
            let sign=i===0 ? "" : pick([" + "," - "]);

            problem+=sign+term(a,n);

            let d=dTerm(a,n);
            derivative+=sign+d;
        }

        derivative=addSign(derivative);

        return{
            problem:"y = "+problem,
            answer:derivative,
            solution:`Differentiate each term separately.

Answer: y' = ${derivative}`
        };
    }

    if(type===2){
        let a=rand(2,7);
        let n=rand(2,5);
        let b=rand(2,8);

        return{
            problem:`y = ${term(a,n)} + sin(${b}x)`,
            answer:`${dTerm(a,n)}+${b}cos(${b}x)`,
            solution:`Differentiate each part:
${term(a,n)} ã ${dTerm(a,n)}
sin(${b}x) ã ${b}cos(${b}x)

Answer: y' = ${dTerm(a,n)} + ${b}cos(${b}x)`
        };
    }

    if(type===3){
        let a=rand(2,7);
        let n=rand(2,5);
        let b=rand(2,8);

        return{
            problem:`y = ${term(a,n)} + cos(${b}x)`,
            answer:`${dTerm(a,n)}-${b}sin(${b}x)`,
            solution:`Differentiate each part:
${term(a,n)} ã ${dTerm(a,n)}
cos(${b}x) ã -${b}sin(${b}x)

Answer: y' = ${dTerm(a,n)} - ${b}sin(${b}x)`
        };
    }

    let a=rand(2,7);
    let n=rand(2,5);
    let b=rand(2,8);

    return{
        problem:`y = ${term(a,n)} + e^(${b}x)`,
        answer:`${dTerm(a,n)}+${b}e^(${b}x)`,
        solution:`Differentiate each part:
${term(a,n)} ã ${dTerm(a,n)}
e^(${b}x) ã ${b}e^(${b}x)

Answer: y' = ${dTerm(a,n)} + ${b}e^(${b}x)`
    };
}

function generateHard(){
    let type=rand(1,4);

    if(type===1){
        let a=rand(1,5);
        let n=rand(2,5);
        let b=rand(2,8);

        return{
            problem:`y = ${term(a,n)}sin(${b}x)`,
            answer:`${dTerm(a,n)}sin(${b}x)+${term(a,n)}${b}cos(${b}x)`,
            solution:`Product rule:
f = ${term(a,n)}
g = sin(${b}x)

f' = ${dTerm(a,n)}
g' = ${b}cos(${b}x)

Answer:
y' = ${dTerm(a,n)}sin(${b}x) + ${term(a,n)}${b}cos(${b}x)`
        };
    }

    if(type===2){
        let a=rand(2,6);
        let n=rand(2,5);

        return{
            problem:`y = sin(${a}x^${n})`,
            answer:`${a*n}x^${n-1}cos(${a}x^${n})`,
            solution:`Chain rule:
Outer derivative: sin(u) ã cos(u)
Inner derivative: ${a}x^${n} ã ${a*n}x^${n-1}

Answer:
y' = ${a*n}x^${n-1}cos(${a}x^${n})`
        };
    }

    if(type===3){
        let a=rand(2,6);
        let n=rand(2,5);

        return{
            problem:`y = cos(${a}x^${n})`,
            answer:`-${a*n}x^${n-1}sin(${a}x^${n})`,
            solution:`Chain rule:
Outer derivative: cos(u) ã -sin(u)
Inner derivative: ${a}x^${n} ã ${a*n}x^${n-1}

Answer:
y' = -${a*n}x^${n-1}sin(${a}x^${n})`
        };
    }

    let a=rand(2,6);
    let n=rand(2,4);

    return{
        problem:`y = (${a}x + 1)^${n}`,
        answer:`${a*n}(${a}x+1)^${n-1}`,
        solution:`Chain rule:
Bring down the exponent, subtract 1, then multiply by the derivative inside.

Answer:
y' = ${a*n}(${a}x+1)^${n-1}`
    };
}

function generateExpert(){
    let type=rand(1,3);

    if(type===1){
        let a=rand(1,4);
        let n=rand(2,4);
        let b=rand(2,6);

        return{
            problem:`y = (${term(a,n)} + 1)cos(${b}x)`,
            answer:`${dTerm(a,n)}cos(${b}x)-${b}(${term(a,n)}+1)sin(${b}x)`,
            solution:`Product rule plus chain rule:
f = ${term(a,n)} + 1
g = cos(${b}x)

f' = ${dTerm(a,n)}
g' = -${b}sin(${b}x)

Answer:
y' = ${dTerm(a,n)}cos(${b}x) - ${b}(${term(a,n)} + 1)sin(${b}x)`
        };
    }

    if(type===2){
        let a=rand(2,5);
        let n=rand(2,4);
        let b=rand(2,6);

        return{
            problem:`y = sin(${a}x^${n}) + e^(${b}x)`,
            answer:`${a*n}x^${n-1}cos(${a}x^${n})+${b}e^(${b}x)`,
            solution:`Differentiate both parts:
sin(${a}x^${n}) uses chain rule.
e^(${b}x) also uses chain rule.

Answer:
y' = ${a*n}x^${n-1}cos(${a}x^${n}) + ${b}e^(${b}x)`
        };
    }

    let a=rand(1,5);
    let n=rand(2,4);
    let b=rand(2,6);

    return{
        problem:`y = ${term(a,n)} / sin(${b}x)`,
        answer:`(${dTerm(a,n)}sin(${b}x)-${term(a,n)}${b}cos(${b}x))/(sin(${b}x))^2`,
        solution:`Quotient rule:
(f/g)' = (f'g - fg') / gôý

f = ${term(a,n)}
g = sin(${b}x)

f' = ${dTerm(a,n)}
g' = ${b}cos(${b}x)

Answer:
y' = (${dTerm(a,n)}sin(${b}x) - ${term(a,n)}${b}cos(${b}x)) / (sin(${b}x))ôý`
    };
}

function newProblem(){
    let difficulty=document.getElementById("difficulty").value;

    if(difficulty==="easy") current=generateEasy();
    if(difficulty==="medium") current=generateMedium();
    if(difficulty==="hard") current=generateHard();
    if(difficulty==="expert") current=generateExpert();

    document.getElementById("problem").textContent=current.problem;
    document.getElementById("answer").value="";
    document.getElementById("feedback").textContent="";
    document.getElementById("solution").textContent="";
}

function checkAnswer(){
    let user=clean(document.getElementById("answer").value);
    let correct=clean(current.answer);

    if(user===correct){
        document.getElementById("feedback").textContent="ã Correct!";
        document.getElementById("feedback").style.color="green";
        setTimeout(newProblem,1000);
    }else{
        document.getElementById("feedback").textContent="ã Not quite. Try again or click Show Solution.";
        document.getElementById("feedback").style.color="red";
    }
}

function showSolution(){
    document.getElementById("solution").textContent=current.solution;
}

newProblem();
</script>

</body>
</html>
