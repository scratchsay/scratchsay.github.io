<script>
let current;

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function clean(text) {
  return text
    .toLowerCase()
    .replace(/\s/g, "")
    .replace(/\*/g, "")
    .replace(/y'=/g, "")
    .replace(/dy\/dx=/g, "");
}

function term(a, n) {
  if (n === 0) return `${a}`;
  if (n === 1) return `${a}x`;
  return `${a}x^${n}`;
}

function derivativeTerm(a, n) {
  if (n === 0) return "0";
  if (n === 1) return `${a}`;
  return `${a * n}x^${n - 1}`;
}

function generateEasy() {
  const types = ["power", "sin", "cos", "ln", "ex"];
  const type = pick(types);

  if (type === "power") {
    const a = rand(1, 9);
    const n = rand(2, 6);
    return {
      problem: `y = ${term(a, n)}`,
      answer: derivativeTerm(a, n),
      solution: `Power rule: ${term(a, n)} → ${derivativeTerm(a, n)}`
    };
  }

  if (type === "sin") {
    return {
      problem: "y = sin(x)",
      answer: "cos(x)",
      solution: "The derivative of sin(x) is cos(x)."
    };
  }

  if (type === "cos") {
    return {
      problem: "y = cos(x)",
      answer: "-sin(x)",
      solution: "The derivative of cos(x) is -sin(x)."
    };
  }

  if (type === "ln") {
    return {
      problem: "y = ln(x)",
      answer: "1/x",
      solution: "The derivative of ln(x) is 1/x."
    };
  }

  return {
    problem: "y = e^x",
    answer: "e^x",
    solution: "The derivative of e^x is e^x."
  };
}

function generateMedium() {
  let parts = [];
  let derivs = [];

  const count = rand(2, 4);

  for (let i = 0; i < count; i++) {
    const a = rand(1, 9);
    const n = rand(1, 6);
    const sign = i === 0 ? "" : pick([" + ", " - "]);

    parts.push(sign + term(a, n));

    let d = derivativeTerm(a, n);
    if (sign === " - ") d = "-" + d;
    derivs.push(d);
  }

  const problem = "y = " + parts.join("");
  const answer = derivs.join("+").replace(/\+\-/g, "-");

  return {
    problem,
    answer,
    solution: `Differentiate each term separately: y' = ${answer}`
  };
}

function generateHard() {
  const types = ["product", "chainSin", "chainCos", "trigPoly"];
  const type = pick(types);

  if (type === "product") {
    const a = rand(1, 5);
    const n = rand(2, 5);
    return {
      problem: `y = ${term(a, n)}sin(x)`,
      answer: `${a * n}x^${n - 1}sin(x)+${term(a, n)}cos(x)`,
      solution: `Product rule: first derivative times second plus first times second derivative.`
    };
  }

  if (type === "chainSin") {
    const a = rand(2, 6);
    const n = rand(2, 4);
    return {
      problem: `y = sin(${a}x^${n})`,
      answer: `${a * n}x^${n - 1}cos(${a}x^${n})`,
      solution: `Chain rule: derivative of sin(u) is cos(u) · u'. Here u = ${a}x^${n}.`
    };
  }

  if (type === "chainCos") {
    const a = rand(2, 6);
    const n = rand(2, 4);
    return {
      problem: `y = cos(${a}x^${n})`,
      answer: `-${a * n}x^${n - 1}sin(${a}x^${n})`,
      solution: `Chain rule: derivative of cos(u) is -sin(u) · u'. Here u = ${a}x^${n}.`
    };
  }

  const a = rand(2, 7);
  const n = rand(2, 5);

  return {
    problem: `y = ${term(a, n)} + sin(x)`,
    answer: `${a * n}x^${n - 1}+cos(x)`,
    solution: `Differentiate both parts: ${term(a, n)} → ${a * n}x^${n - 1}, and sin(x) → cos(x).`
  };
}

function newProblem() {
  const difficulty = document.getElementById("difficulty").value;

  if (difficulty === "easy") current = generateEasy();
  if (difficulty === "medium") current = generateMedium();
  if (difficulty === "hard") current = generateHard();

  document.getElementById("problem").textContent = current.problem;
  document.getElementById("answer").value = "";
  document.getElementById("feedback").textContent = "";
  document.getElementById("solution").textContent = "";
}

function checkAnswer() {
  const userAnswer = clean(document.getElementById("answer").value);
  const correctAnswer = clean(current.answer);

  if (userAnswer === correctAnswer) {
    document.getElementById("feedback").textContent = "Correct!";
    document.getElementById("feedback").style.color = "green";
    setTimeout(newProblem, 1000);
  } else {
    document.getElementById("feedback").textContent = "Not quite. Try again or click Show Solution.";
    document.getElementById("feedback").style.color = "red";
  }
}

function showSolution() {
  document.getElementById("solution").textContent =
    current.solution + " Answer: y' = " + current.answer;
}

newProblem();
</script>
