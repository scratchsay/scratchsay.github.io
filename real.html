<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Actor Observation Box</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; padding:20px; }
    .box { max-width:750px; margin:auto; background:white; padding:20px; border-radius:14px; }
    label { font-weight:bold; display:block; margin-top:15px; }
    input, select, textarea {
      width:100%; padding:10px; margin-top:6px;
      border:1px solid #ccc; border-radius:8px; box-sizing:border-box;
    }
    textarea { min-height:75px; resize:vertical; }
    button {
      margin-top:20px; width:100%; padding:12px;
      background:#222; color:white; border:0; border-radius:10px; cursor:pointer;
    }
    .message { margin-top:12px; color:green; font-weight:bold; }
  </style>
</head>
<body>

<div class="box">
  <h1>Actor Observation Box</h1>

  <label>Interaction Name</label>
  <input id="interaction" placeholder="Example: Two friends arguing quietly" />

  <label>Date</label>
  <input id="date" type="date" />

  <label>Location</label>
  <input id="location" placeholder="Example: School hallway, café, bus stop" />

  <label>Observation Category</label>
  <select id="category" onchange="loadQuestions()">
    <option value="Physical Behavior">Physical Behavior</option>
    <option value="Voice">Voice</option>
    <option value="Facial Expressions">Facial Expressions</option>
    <option value="Emotional Transitions">Emotional Transitions</option>
    <option value="Relationships">Relationships</option>
    <option value="Objectives">Objectives</option>
    <option value="Habits and Quirks">Habits and Quirks</option>
    <option value="Group Dynamics">Group Dynamics</option>
  </select>

  <div id="questions"></div>

  <label>Overall Takeaway</label>
  <textarea id="takeaway" placeholder="What are the biggest acting lessons from this observation?"></textarea>

  <button onclick="exportToNotion()">Export for Notion</button>
  <div id="message" class="message"></div>
</div>

<script>
  document.getElementById("date").value = new Date().toISOString().split("T")[0];

  const questionSets = {
    "Physical Behavior": [
      "How fast did they move?",
      "How did they stand or sit?",
      "What was their posture like?",
      "What did they do with their hands?",
      "How much space did they take up?",
      "Did they have any repeated movements?",
      "What physical detail stood out most?"
    ],
    "Voice": [
      "How fast did they speak?",
      "Was their voice loud, quiet, or changing?",
      "Did their pitch change?",
      "Where did they pause?",
      "Did they use filler words?",
      "Did they interrupt or wait?",
      "What made their voice unique?"
    ],
    "Facial Expressions": [
      "How much eye contact did they make?",
      "How expressive were their eyebrows?",
      "How often did they smile?",
      "Did they seem to hide any emotions?",
      "How quickly did their expressions change?",
      "What expression appeared most often?"
    ],
    "Emotional Transitions": [
      "What emotion did they start with?",
      "What caused the emotional change?",
      "How quickly did the emotion change?",
      "How did their body language change?",
      "How did their voice change?",
      "What emotion did they end with?"
    ],
    "Relationships": [
      "Who were they interacting with?",
      "What did the relationship seem to be?",
      "Who seemed to have more social power?",
      "How did they treat the other person?",
      "Did their behavior change during the interaction?",
      "What did you learn about the relationship?"
    ],
    "Objectives": [
      "What did they seem to want?",
      "What obstacle was in their way?",
      "What tactics did they use?",
      "Did they achieve their objective?",
      "What changed by the end?"
    ],
    "Habits and Quirks": [
      "What repeated behavior did they have?",
      "Did they use any repeated phrases?",
      "Did they touch their face, hair, clothes, or objects?",
      "Did they show any nervous habits?",
      "Did they have any unusual gestures?",
      "What made them memorable?"
    ],
    "Group Dynamics": [
      "How many people were present?",
      "Who led the conversation?",
      "Who spoke the least?",
      "Who interrupted others?",
      "How did people react to each other?",
      "What role did each person seem to play?"
    ]
  };

  function loadQuestions() {
    const category = document.getElementById("category").value;
    const container = document.getElementById("questions");
    container.innerHTML = "";

    questionSets[category].forEach((question, index) => {
      const label = document.createElement("label");
      label.textContent = question;

      const textarea = document.createElement("textarea");
      textarea.id = "q" + index;
      textarea.placeholder = "Write your observation here...";

      container.appendChild(label);
      container.appendChild(textarea);
    });
  }

  function exportToNotion() {
    const interaction = document.getElementById("interaction").value || "Untitled Observation";
    const date = document.getElementById("date").value;
    const location = document.getElementById("location").value;
    const category = document.getElementById("category").value;
    const takeaway = document.getElementById("takeaway").value;

    let output = `# ${interaction}\n\n`;
    output += `**Date:** ${date}\n`;
    output += `**Location:** ${location}\n`;
    output += `**Category:** ${category}\n\n`;

    questionSets[category].forEach((question, index) => {
      const answer = document.getElementById("q" + index).value;
      output += `## ${question}\n${answer}\n\n`;
    });

    output += `## Overall Takeaway\n${takeaway}`;

    navigator.clipboard.writeText(output).then(() => {
      document.getElementById("message").textContent =
        "Copied! Paste it directly into Notion.";
    });
  }

  loadQuestions();
</script>

</body>
</html>
