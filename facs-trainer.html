<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Fast FACS Trainer</title>
<style>
body{font-family:Arial,sans-serif;background:#f2f2f2;text-align:center;padding:15px}
.face{width:300px;height:360px;background:#ffd7b5;border-radius:45%;margin:15px auto;position:relative;transition:.15s}
.eye{width:58px;height:30px;background:white;border:3px solid #222;border-radius:50%;position:absolute;top:115px;overflow:hidden;transition:.15s}
.left-eye{left:70px}.right-eye{right:70px}
.pupil{width:17px;height:17px;background:#111;border-radius:50%;position:absolute;top:6px;left:20px;transition:.15s}
.brow{width:65px;height:9px;background:#3b1f10;border-radius:8px;position:absolute;top:82px;transition:.15s}
.left-brow{left:65px}.right-brow{right:65px}
.nose{width:36px;height:55px;background:#efb990;border-radius:45%;position:absolute;top:158px;left:132px;transition:.15s}
.nose::after{content:"";display:none;position:absolute;left:-15px;top:15px;width:65px;height:8px;background:#8b4a2b;border-radius:8px}
.mouth{width:95px;height:35px;border-bottom:9px solid #8b2b2b;border-radius:0 0 90px 90px;position:absolute;top:245px;left:102px;transition:.15s}
.cheek{width:48px;height:28px;background:rgba(255,120,120,.25);border-radius:50%;position:absolute;top:178px;transition:.15s}
.left-cheek{left:50px}.right-cheek{right:50px}
.mark{position:absolute;font-weight:bold;font-size:26px;color:#b00000;display:none}
#markL{left:46px;top:165px}#markR{right:46px;top:165px}
.chin{width:50px;height:18px;border-top:5px solid #b97a57;border-radius:50%;position:absolute;top:292px;left:125px;display:none}
input{padding:12px;width:280px;font-size:18px}
button{padding:12px 18px;font-size:17px;margin:7px;cursor:pointer}
#result{font-weight:bold;font-size:20px}
</style>
</head>
<body>

<h1>Fast FACS Trainer</h1>
<p>Type activated AU numbers separated by commas.</p>

<div class="face" id="face">
  <div class="brow left-brow" id="lb"></div>
  <div class="brow right-brow" id="rb"></div>

  <div class="eye left-eye" id="le"><div class="pupil" id="lp"></div></div>
  <div class="eye right-eye" id="re"><div class="pupil" id="rp"></div></div>

  <div class="cheek left-cheek" id="lc"></div>
  <div class="cheek right-cheek" id="rc"></div>
  <div class="mark" id="markL">▲</div>
  <div class="mark" id="markR">▲</div>

  <div class="nose" id="nose"></div>
  <div class="mouth" id="mouth"></div>
  <div class="chin" id="chin"></div>
</div>

<input id="answer" autocomplete="off" placeholder="Example: 1, 6, 25" />
<br>
<button onclick="checkAnswer()">Check</button>
<button onclick="nextFace()">Next</button>

<p id="result"></p>
<p>Score: <span id="score">0</span> | Round: <span id="round">0</span></p>

<script>
const allAUs = [
  1,2,4,
  61,62,63,64,
  5,7,41,44,42,43,
  6,9,10,14,15,16,17,24,25,26,27,28
];

let current = [];
let score = 0;
let round = 0;

const $ = id => document.getElementById(id);

function resetFace() {
  face.style.transform = "none";
  lb.style.transform = rb.style.transform = "none";

  le.style.height = re.style.height = "30px";
  le.style.transform = re.style.transform = "none";
  lp.style.transform = rp.style.transform = "none";

  nose.style.transform = "none";
  nose.style.boxShadow = "none";
  nose.classList.remove("wrinkle");

  mouth.style.width = "95px";
  mouth.style.height = "35px";
  mouth.style.left = "102px";
  mouth.style.top = "245px";
  mouth.style.borderBottom = "9px solid #8b2b2b";
  mouth.style.borderTop = "none";
  mouth.style.borderRadius = "0 0 90px 90px";
  mouth.style.transform = "none";
  mouth.style.background = "transparent";

  lc.style.transform = rc.style.transform = "none";
  lc.style.background = rc.style.background = "rgba(255,120,120,.25)";
  markL.style.display = markR.style.display = "none";
  chin.style.display = "none";
}

function activateAU(au) {
  switch (au) {
    case 1:
      lb.style.transform = "translateY(-24px) rotate(-15deg)";
      break;

    case 2:
      rb.style.transform = "translateY(-24px) rotate(15deg)";
      break;

    case 4:
      lb.style.transform = "translateY(20px) rotate(20deg)";
      rb.style.transform = "translateY(20px) rotate(-20deg)";
      break;

    case 61:
      lp.style.transform = rp.style.transform = "translateX(-20px)";
      break;

    case 62:
      lp.style.transform = rp.style.transform = "translateX(20px)";
      break;

    case 63:
      lp.style.transform = rp.style.transform = "translateY(-10px)";
      break;

    case 64:
      lp.style.transform = rp.style.transform = "translateY(10px)";
      break;

    case 5:
      le.style.height = re.style.height = "48px";
      le.style.top = re.style.top = "105px";
      break;

    case 7:
      le.style.height = re.style.height = "16px";
      le.style.transform = re.style.transform = "scaleX(1.08)";
      break;

    case 41:
      le.style.height = re.style.height = "14px";
      le.style.transform = re.style.transform = "translateY(8px)";
      break;

    case 44:
      le.style.height = re.style.height = "10px";
      lb.style.transform = "translateY(12px)";
      rb.style.transform = "translateY(12px)";
      break;

    case 42:
      le.style.height = re.style.height = "7px";
      break;

    case 43:
      le.style.height = re.style.height = "2px";
      break;

    case 6:
      lc.style.transform = rc.style.transform = "translateY(-22px) scale(1.35)";
      lc.style.background = rc.style.background = "rgba(255,60,60,.6)";
      le.style.height = re.style.height = "18px";
      markL.style.display = markR.style.display = "block";
      break;

    case 9:
      nose.style.transform = "scaleX(1.45) translateY(-10px)";
      nose.style.boxShadow = "0 -12px 0 #b97a57";
      break;

    case 10:
      mouth.style.transform = "translateY(-18px)";
      mouth.style.borderBottom = "12px solid #8b2b2b";
      break;

    case 14:
      mouth.style.width = "70px";
      mouth.style.left = "115px";
      mouth.style.transform = "skewX(-18deg)";
      break;

    case 15:
      mouth.style.borderBottom = "none";
      mouth.style.borderTop = "9px solid #8b2b2b";
      mouth.style.borderRadius = "90px 90px 0 0";
      mouth.style.top = "260px";
      break;

    case 16:
      mouth.style.height = "55px";
      mouth.style.top = "238px";
      break;

    case 17:
      chin.style.display = "block";
      mouth.style.transform = "translateY(-14px)";
      break;

    case 24:
      mouth.style.height = "3px";
      mouth.style.borderBottom = "12px solid #8b2b2b";
      mouth.style.borderRadius = "20px";
      break;

    case 25:
      mouth.style.height = "18px";
      mouth.style.background = "#4b1515";
      mouth.style.borderBottom = "5px solid #8b2b2b";
      break;

    case 26:
      mouth.style.height = "78px";
      mouth.style.width = "80px";
      mouth.style.left = "110px";
      mouth.style.background = "#4b1515";
      mouth.style.borderBottom = "8px solid #8b2b2b";
      break;

    case 27:
      mouth.style.height = "90px";
      mouth.style.width = "135px";
      mouth.style.left = "82px";
      mouth.style.background = "#4b1515";
      mouth.style.borderBottom = "8px solid #8b2b2b";
      break;

    case 28:
      mouth.style.width = "48px";
      mouth.style.left = "126px";
      mouth.style.height = "8px";
      mouth.style.borderBottom = "10px solid #8b2b2b";
      mouth.style.borderRadius = "20px";
      break;
  }
}

function nextFace() {
  resetFace();
  $("answer").value = "";
  $("result").textContent = "";

  current = [];
  let count = Math.floor(Math.random() * 3) + 1;

  while (current.length < count) {
    let au = allAUs[Math.floor(Math.random() * allAUs.length)];
    if (!current.includes(au)) current.push(au);
  }

  current.forEach(activateAU);
  round++;
  $("round").textContent = round;
  $("answer").focus();
}

function checkAnswer() {
  const guess = $("answer").value
    .split(/[,\s]+/)
    .map(x => Number(x.trim()))
    .filter(x => !isNaN(x))
    .sort((a,b) => a-b);

  const correct = [...current].sort((a,b) => a-b);

  if (JSON.stringify(guess) === JSON.stringify(correct)) {
    score++;
    $("result").textContent = "Correct";
    $("result").style.color = "green";
    setTimeout(nextFace, 450);
  } else {
    $("result").textContent = "Wrong — correct: " + correct.join(", ");
    $("result").style.color = "red";
  }

  $("score").textContent = score;
}

$("answer").addEventListener("keydown", e => {
  if (e.key === "Enter") checkAnswer();
});

nextFace();
</script>

</body>
</html>
