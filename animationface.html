<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenFace Face Animation Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    #viewer {
      background: #000;
      border: 1px solid #444;
      border-radius: 10px;
      width: min(95vw, 900px);
      height: min(65vh, 650px);
    }

    .panel {
      width: min(95vw, 900px);
      background: #1d1d1d;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      box-sizing: border-box;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    button, input, select {
      font-size: 15px;
      padding: 8px 10px;
      border-radius: 7px;
      border: 1px solid #555;
    }

    button {
      background: #2d2d2d;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3a3a3a;
    }

    input[type="range"] {
      flex: 1;
      min-width: 220px;
    }

    .stats {
      margin-top: 8px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <h1>OpenFace Face Animation Viewer</h1>

  <div class="panel">
    <input id="fileInput" type="file" accept=".csv,.xlsx,.xls" />
    <span id="status">Load an OpenFace CSV or Excel file.</span>
  </div>

  <canvas id="viewer" width="900" height="650"></canvas>

  <div class="panel">
    <div class="controls">
      <button id="back10">⏪ 10</button>
      <button id="back1">◀ 1</button>
      <button id="playPause">▶ Play</button>
      <button id="forward1">1 ▶</button>
      <button id="forward10">10 ⏩</button>

      <label>
        FPS:
        <input id="fps" type="number" min="1" max="120" value="30" style="width:70px" />
      </label>

      <label>
        Points:
        <select id="pointMode">
          <option value="lines">Lines + points</option>
          <option value="points">Points only</option>
        </select>
      </label>
    </div>

    <div class="controls" style="margin-top:10px;">
      <input id="timeline" type="range" min="0" max="0" value="0" />
    </div>

    <div class="stats" id="stats">Frame: 0 / 0</div>
  </div>

  <script>
    const canvas = document.getElementById("viewer");
    const ctx = canvas.getContext("2d");

    const fileInput = document.getElementById("fileInput");
    const statusEl = document.getElementById("status");
    const statsEl = document.getElementById("stats");
    const timeline = document.getElementById("timeline");
    const playPause = document.getElementById("playPause");
    const fpsInput = document.getElementById("fps");
    const pointMode = document.getElementById("pointMode");

    let rows = [];
    let currentFrame = 0;
    let playing = false;
    let lastStepTime = 0;

    // OpenFace 68-point landmark connections.
    const connections = [
      range(0, 16),    // jaw
      range(17, 21),   // left eyebrow
      range(22, 26),   // right eyebrow
      range(27, 30),   // nose bridge
      range(31, 35),   // lower nose
      closedRange(36, 41), // left eye
      closedRange(42, 47), // right eye
      closedRange(48, 59), // outer mouth
      closedRange(60, 67)  // inner mouth
    ].flat();

    function range(a, b) {
      const out = [];
      for (let i = a; i < b; i++) out.push([i, i + 1]);
      return out;
    }

    function closedRange(a, b) {
      const out = range(a, b);
      out.push([b, a]);
      return out;
    }

    function cleanKeys(row) {
      const cleaned = {};
      for (const key in row) cleaned[key.trim()] = row[key];
      return cleaned;
    }

    function parseCSV(text) {
      // Handles normal CSV exported by OpenFace, including quoted values.
      const lines = text.replace(/\r/g, "").split("\n").filter(line => line.trim());
      const headers = splitCSVLine(lines[0]).map(h => h.trim());
      return lines.slice(1).map(line => {
        const values = splitCSVLine(line);
        const row = {};
        headers.forEach((h, i) => row[h] = values[i] ?? "");
        return row;
      });
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    fileInput.addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;

      statusEl.textContent = "Loading file...";

      const name = file.name.toLowerCase();

      try {
        if (name.endsWith(".csv")) {
          const text = await file.text();
          rows = parseCSV(text).map(cleanKeys);
        } else if (name.endsWith(".xlsx") || name.endsWith(".xls")) {
          const buffer = await file.arrayBuffer();
          const workbook = XLSX.read(buffer, { type: "array" });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          rows = XLSX.utils.sheet_to_json(firstSheet, { defval: "" }).map(cleanKeys);
        } else {
          throw new Error("Unsupported file type. Use CSV, XLSX, or XLS.");
        }

        rows = rows.filter(row => hasLandmarks(row));

        if (!rows.length) {
          throw new Error("No usable OpenFace x_0/y_0 or X_0/Y_0 landmark columns found.");
        }

        currentFrame = 0;
        timeline.max = rows.length - 1;
        timeline.value = 0;
        statusEl.textContent = `Loaded ${rows.length} frames.`;
        drawFrame();
      } catch (err) {
        rows = [];
        statusEl.textContent = "Error: " + err.message;
        clearCanvas();
      }
    });

    function hasLandmarks(row) {
      return ("x_0" in row && "y_0" in row) || ("X_0" in row && "Y_0" in row);
    }

    function getPoint(row, i) {
      // Prefer OpenFace 2D image coordinates x_i/y_i.
      // If those are all zero or missing, fall back to 3D model X_i/Y_i projected as 2D.
      let x = Number(row[`x_${i}`]);
      let y = Number(row[`y_${i}`]);

      if (!Number.isFinite(x) || !Number.isFinite(y) || (x === 0 && y === 0)) {
        x = Number(row[`X_${i}`]);
        y = Number(row[`Y_${i}`]);
      }

      if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
      return { x, y };
    }

    function getAllPoints(row) {
      const pts = [];
      for (let i = 0; i < 68; i++) pts.push(getPoint(row, i));
      return pts;
    }

    function normalizePoints(points) {
      const valid = points.filter(Boolean);
      const minX = Math.min(...valid.map(p => p.x));
      const maxX = Math.max(...valid.map(p => p.x));
      const minY = Math.min(...valid.map(p => p.y));
      const maxY = Math.max(...valid.map(p => p.y));

      const width = Math.max(maxX - minX, 1);
      const height = Math.max(maxY - minY, 1);
      const pad = 60;
      const scale = Math.min(
        (canvas.width - pad * 2) / width,
        (canvas.height - pad * 2) / height
      );

      return points.map(p => {
        if (!p) return null;
        return {
          x: (p.x - minX) * scale + pad + (canvas.width - width * scale - pad * 2) / 2,
          y: (p.y - minY) * scale + pad + (canvas.height - height * scale - pad * 2) / 2
        };
      });
    }

    function drawFrame() {
      if (!rows.length) return clearCanvas();

      const row = rows[currentFrame];
      const points = normalizePoints(getAllPoints(row));

      clearCanvas();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "#00e5ff";
      ctx.fillStyle = "#ffffff";

      if (pointMode.value === "lines") {
        for (const [a, b] of connections) {
          const p1 = points[a];
          const p2 = points[b];
          if (!p1 || !p2) continue;

          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
      }

      for (const p of points) {
        if (!p) continue;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      timeline.value = currentFrame;

      const frameNumber = row.frame ?? currentFrame + 1;
      const timestamp = row.timestamp ? ` | Time: ${Number(row.timestamp).toFixed(3)}s` : "";
      const confidence = row.confidence ? ` | Confidence: ${Number(row.confidence).toFixed(2)}` : "";

      statsEl.textContent = `Frame: ${currentFrame + 1} / ${rows.length} | OpenFace frame: ${frameNumber}${timestamp}${confidence}`;
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function setFrame(index) {
      if (!rows.length) return;
      currentFrame = Math.max(0, Math.min(rows.length - 1, index));
      drawFrame();
    }

    function togglePlay() {
      if (!rows.length) return;
      playing = !playing;
      playPause.textContent = playing ? "⏸ Pause" : "▶ Play";
      lastStepTime = performance.now();
      requestAnimationFrame(animationLoop);
    }

    function animationLoop(now) {
      if (!playing) return;

      const fps = Math.max(1, Math.min(120, Number(fpsInput.value) || 30));
      const interval = 1000 / fps;

      if (now - lastStepTime >= interval) {
        currentFrame++;
        if (currentFrame >= rows.length) currentFrame = 0;
        drawFrame();
        lastStepTime = now;
      }

      requestAnimationFrame(animationLoop);
    }

    playPause.addEventListener("click", togglePlay);
    document.getElementById("back1").addEventListener("click", () => setFrame(currentFrame - 1));
    document.getElementById("forward1").addEventListener("click", () => setFrame(currentFrame + 1));
    document.getElementById("back10").addEventListener("click", () => setFrame(currentFrame - 10));
    document.getElementById("forward10").addEventListener("click", () => setFrame(currentFrame + 10));
    timeline.addEventListener("input", () => setFrame(Number(timeline.value)));
    pointMode.addEventListener("change", drawFrame);

    document.addEventListener("keydown", event => {
      if (event.code === "Space") {
        event.preventDefault();
        togglePlay();
      } else if (event.code === "ArrowLeft") {
        setFrame(currentFrame - 1);
      } else if (event.code === "ArrowRight") {
        setFrame(currentFrame + 1);
      }
    });

    clearCanvas();
  </script>
</body>
</html>
